<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pay Developer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .joyce {
      font-size: 48px;
      font-weight: 800;
      color: #a5b4fc;
      margin-bottom: 12px;
    }

    .message {
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .message span {
      color: #a5b4fc;
    }

    .warning {
      font-size: 48px;
      margin: 8px 0 24px;
    }

    .threat {
      font-size: 18px;
      font-weight: 600;
      color: #f87171;
      margin-bottom: 8px;
    }

    .threat span {
      color: #fca5a5;
      text-decoration: underline;
    }

    .pay-btn {
      width: 100%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.1s ease;
    }

    .pay-btn:hover {
      opacity: 0.9;
    }

    .pay-btn:active {
      transform: scale(0.98);
    }

    .pay-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .success-msg {
      display: none;
      margin-top: 20px;
      font-size: 15px;
      color: #4ade80;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="joyce">Joyce</div>
    <div class="message">Pay the developer <span>his money</span> 💸</div>
    <div class="threat">or else I will put down <span>all your websites</span></div>
    <div class="warning">⚠️ ⚠️</div>
    <button class="pay-btn" id="payBtn" onclick="handlePay()">Pay Now</button>
    <div class="success-msg" id="successMsg">PAY THE MONEY</div>
  </div>

  <script>
    function handlePay() {
      const btn = document.getElementById("payBtn");
      const msg = document.getElementById("successMsg");

      btn.disabled = true;
      btn.textContent = "Pay the Money...";

      setTimeout(() => {
        btn.textContent = "Pay Now";
        btn.disabled = false;
        msg.style.display = "block";

        setTimeout(() => {
          msg.style.display = "none";
        }, 4000);
      }, 1500);
    }
  </script>
</body>
</html>
